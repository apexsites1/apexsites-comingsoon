<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ApexSites | Coming Soon</title>
  <meta name="description" content="Join the ApexSites pre-launch list for early access to AI-generated websites built for agencies, freelancers, and entrepreneurs." />
  <meta name="robots" content="index,follow" />
  <link rel="canonical" href="https://comingsoon.apexsites.ai/" />

  <meta property="og:title" content="ApexSites | Coming Soon" />
  <meta property="og:description" content="Join early access for ApexSites, the AI-powered website platform for agencies and entrepreneurs." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://comingsoon.apexsites.ai/" />
  <meta property="og:site_name" content="ApexSites" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="ApexSites | Coming Soon" />
  <meta name="twitter:description" content="Join early access for ApexSites, the AI-powered website platform for agencies and entrepreneurs." />
  <meta name="theme-color" content="#0B0F0A" />

  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />
  <link rel="preload" href="assets/video/apexsites-logo.mp4" as="video" type="video/mp4" />
  <link rel="stylesheet" href="assets/css/styles.css" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "SoftwareApplication",
    "name": "ApexSites",
    "applicationCategory": "BusinessApplication",
    "operatingSystem": "Web",
    "description": "ApexSites helps agencies, freelancers, and entrepreneurs generate, sell, host, export, and manage premium AI-generated websites.",
    "url": "https://comingsoon.apexsites.ai/"
  }
  </script>
</head>
<body>
  <main class="splash" aria-labelledby="page-title">
    <div class="grid-overlay" aria-hidden="true"></div>
    <div class="ambient ambient-one" aria-hidden="true"></div>
    <div class="ambient ambient-two" aria-hidden="true"></div>

    <section class="card" aria-label="ApexSites pre-launch signup">
      <div class="logo-shell" aria-label="ApexSites logo animation">
        <video
          class="logo-video"
          id="logoVideo"
          autoplay
          muted
          playsinline
          preload="auto"
        >
          <source src="assets/video/apexsites-logo.mp4" type="video/mp4" />
          ApexSites
        </video>
      </div>

      <p class="eyebrow">Pre-launch access</p>
      <h1 id="page-title">AI-generated websites built to sell.</h1>
      <p class="description">
        ApexSites helps agencies, freelancers, and entrepreneurs create premium client-ready websites faster, then sell, host, export, and manage them under their own brand.
      </p>

      <form class="signup-form" id="preSignupForm" novalidate>
        <div class="field-group">
          <label class="sr-only" for="name">Name</label>
          <input id="name" type="text" name="name" autocomplete="name" placeholder="Name" required minlength="2" />
        </div>

        <div class="field-group">
          <label class="sr-only" for="email">Email address</label>
          <input id="email" type="email" name="email" autocomplete="email" inputmode="email" placeholder="Email address" required />
        </div>

        <div class="hp-field" aria-hidden="true">
          <label for="company">Company</label>
          <input id="company" type="text" name="company" tabindex="-1" autocomplete="off" />
        </div>

        <button type="submit" id="submitButton">Get Early Access</button>
      </form>

      <p class="form-message" id="formMessage" aria-live="polite"></p>
      <p class="microcopy">Early invites will be sent on a first-come basis during pre-launch.</p>
    </section>
  </main>

  <noscript>
    <div class="noscript">Please enable JavaScript to join the ApexSites early access list.</div>
  </noscript>

  <script src="assets/js/main.js" defer></script>
</body>
</html>
